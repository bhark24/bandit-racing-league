<!DOCTYPE html>

    <!-- Google Fonts for an aggressive, modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="standings.html">Standings</a></li>
                <li><a href="schedule.html" class="active">Schedule</a></li>
                <li><a href="results.html">Results</a></li>
                <li><a href="drivers.html">Drivers</a></li>

                <li><a href="/geezer-app.html"><img src="assets/geezer-icon.png" alt="Geezer App" style="height: 42px; vertical-align: middle; filter: drop-shadow(0 0 5px rgba(0,255,0,0.5));"></a></li>
                <li><a href="/simtrax.html"><img src="assets/simtrax-logo.png" alt="SimTrax Broadcasting" style="height: 42px; vertical-align: middle; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));"></a></li>
            </ul>
            <div class="nav-actions" style="display: flex; align-items: center; gap: 15px;">
                <a href="/apply.html" class="btn-secondary">Apply to League</a>
                <div class="qr-container">
                    <img src="assets/discord-qr.png" alt="QR Code" style="height: 42px; border-radius: 4px; border: 2px solid var(--neon-green); transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'" onerror="this.onerror=null; this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='">

                        <p style="margin-top: 10px; font-weight: bold; font-family: var(--font-heading); color: var(--neon-green); text-transform: uppercase;">Scan to Join!</p>
                    </div>
                </div>
                <a href="https://discord.gg/zXjvS9en" target="_blank" class="btn-primary">Join Discord</a>
            </div>
        </div>
    </nav>

    <!-- Schedule Section -->
    <section class="container" style="margin-top: 40px; margin-bottom: 60px;">
        <div style="text-align: center;">
            <img src="assets/season16-promo.jpg" alt="Season 16 Schedule" style="max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(153, 255, 51, 0.4);" onerror="this.onerror=null; this.outerHTML='<div style=\'padding: 20px; border: 2px dashed #99ff33; color: #fff;\'>Save your promo image to assets/season16-promo.jpg to display it here!</div>'">
        </div>
    </section>

    <footer>

            <div style="text-align: center;">
                <img src="assets/discord-qr.png" alt="Join Discord QR Code" style="max-width: 150px; border-radius: 12px; border: 2px solid var(--neon-green); box-shadow: 0 0 15px rgba(0,255,0,0.2);" onerror="this.onerror=null; this.outerHTML='<div style=\'padding: 20px; border: 2px dashed #00ff00; color: #fff; margin-bottom: 10px;\'>Save QR Code as assets/discord-qr.png</div>'">
                <p style="margin-top: 10px; font-family: var(--font-heading); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: var(--neon-green);">Scan to Join our Discord!</p>
            </div>
