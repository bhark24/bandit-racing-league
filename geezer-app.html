<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geezer Authentic's App | Bandit Racing League</title>
    <!-- Google Fonts for an aggressive, modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="/index.html">Home</a></li>
                <li><a href='/standings.html'>Standings</a></li>
                <li><a href='/schedule.html'>Schedule</a></li>
                <li><a href='/results.html'>Results</a></li>
                <li><a href='/drivers.html'>Drivers</a></li>
                <li><a href="/fantasy.html">Fantasy League</a></li>
                <li><a href="/geezer-app.html" class="active"><img src="assets/geezer-icon.png" alt="Geezer App" style="height: 42px; vertical-align: middle; filter: drop-shadow(0 0 5px rgba(0,255,0,0.5));"></a></li>
                <li><a href="/simtrax.html"><img src="assets/simtrax-logo.png" alt="SimTrax Broadcasting" style="height: 42px; vertical-align: middle; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));"></a></li>
            </ul>
            <div class="nav-actions" style="display: flex; align-items: center; gap: 15px;">
                <a href="/apply.html" class="btn-secondary">Apply to League</a>
                <div class="qr-container">
                    <img src="assets/discord-qr.png" alt="QR Code" style="height: 42px; border-radius: 4px; border: 2px solid var(--neon-green); transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                    <div class="qr-popup">
                        <img src="assets/discord-qr.png" style="width: 100%; border-radius: 4px;">
                        <p style="margin-top: 10px; font-weight: bold; font-family: var(--font-heading); color: var(--neon-green); text-transform: uppercase;">Scan to Join!</p>
                    </div>
                </div>
                <a href="https://discord.gg/zXjvS9en" target="_blank" class="btn-primary">Join Discord</a>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="hero" style="min-height: 50vh; padding-top: 60px; display: flex; align-items: center; justify-content: center; text-align: center;">
        <div class="hero-overlay"></div>
        <div class="hero-content" style="position: relative; z-index: 2;">
            <!-- App Logo (will degrade to text if not found) -->
            <img src="assets/geezer-logo.png" alt="Geezer Authentic's App" style="max-width: 500px; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(0, 255, 0, 0.2));" onerror="this.onerror=null; this.outerHTML='<h1 class=\'hero-title\' style=\'font-size: 5rem;\'>GEEZER <span class=\'accent\'>AUTHENTIC\\'S</span> APP</h1>'">
            
            <div style="background-color: rgba(255, 204, 0, 0.1); border: 2px dashed var(--chase-yellow); padding: 20px 40px; border-radius: 8px; display: inline-block; margin-top: 30px;">
                <h2 class="hero-subtitle italic-heavy" style="text-transform: uppercase; letter-spacing: 5px; color: var(--chase-yellow); font-size: 2rem; margin: 0; text-shadow: 0 0 15px rgba(255, 204, 0, 0.3);">🚧 UNDER CONSTRUCTION 🚧</h2>
                <p style="color: #fff; margin-top: 10px; font-family: var(--font-body); font-size: 1.1rem;">The custom Pit Road Warning System and Driver Authentication portal is currently being built.</p>
            </div>
        </div>
    </header>

    <footer>
        <div class="container footer-content">
            <p>&copy; 2026 Bandit Racing League. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
