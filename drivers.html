                    <span class="hamburger"></span>
                </button>
            </div>
            
            <ul class="nav-links">
                <li><a href="/apply.html" class="btn-secondary">Apply to League</a></li>
                <li><a href="/index.html">Home</a></li>
                <li><a href="/standings.html">Standings</a></li>
                <li><a href="/schedule.html">Schedule</a></li>
                <li><a href="/results.html">Results</a></li>
                <li><a class="active" href="/drivers.html">Drivers</a></li>
                <li><a href="/teams.html">Teams</a></li>
                <li><a data-tooltip="Fantasy League" href="/fantasy.html"><img src="assets/fantasy-icon.png" alt="Fantasy League" style="height: 42px; width: 42px; border-radius: 50%; border: 1.5px solid var(--neon-green); vertical-align: middle; filter: drop-shadow(0 0 5px rgba(0,255,0,0.4)); object-fit: cover;"><span class="nav-icon-label">Fantasy League</span></a></li>
                <li><a data-tooltip="Geezer App" href="/geezer-app.html"><img src="assets/geezer-icon.png" alt="Geezer App" style="height: 42px; vertical-align: middle; filter: drop-shadow(0 0 5px rgba(0,255,0,0.5));"><span class="nav-icon-label">Geezer App</span></a></li>
                <li><a data-tooltip="SimTrax Broadcasting" href="/simtrax.html"><img src="assets/simtrax-logo.png" alt="SimTrax Broadcasting" style="height: 42px; vertical-align: middle; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));"><span class="nav-icon-label">SimTrax Broadcasting</span></a></li>
            </ul>
            <div class="nav-actions" style="display: flex; align-items: center; gap: 15px;">
                <a href="https://discord.gg/HSvP4UG2st" target="_blank" class="btn-primary">Join Discord</a>
            </div>

    <!-- Header -->
    <header class="schedule-header container text-center">
        <div class="header-content">
            <h1 class="italic-heavy accent title-massive">DRIVER ROSTER</h1>
            <h2 class="italic-heavy text-light">SEASON 16</h2>
        </div>
    </header>

    <!-- Grid -->
    <section class="container" style="margin-bottom: 80px;">
        <div class="roster-grid" id="driver-grid">
            <!-- Drivers are dynamically generated here -->
        </div>
    </section>

    <script src="teams_data.js"></script>
    <script src="roster_data.js"></script>
    <script>
        const grid = document.getElementById('driver-grid');

        function getDriverImgPath(name) {
            if (!name) return '';
            const formattedName = name.trim().toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            return `assets/drivers numbers/${formattedName}.png`;
        }

        function findTeamsForDriver(driverName) {
            if (typeof teamsData === 'undefined' || !teamsData.teams) return [];
            
            function normalize(name) {
                if (!name) return "";
                let n = name.toUpperCase().trim().replace(/[\s\.\-_]/g, "");
                if (n === "DIANTERODER" || n === "DIANTERADER") return "DIONTERADER";
                if (n === "DAVIDLEAKEY") return "DAVELEAKEY";
                return n;
            }

            const nameNorm = normalize(driverName);
            if (!nameNorm) return [];

            const matchedTeams = [];
            for (let team of teamsData.teams) {
                const primary = (team.drivers.primary || []).map(normalize);
                const backup = (team.drivers.backup || []).map(normalize);
                if (primary.includes(nameNorm) || backup.includes(nameNorm)) {
                    const isBackup = backup.includes(nameNorm);
                    matchedTeams.push({
                        team: team,
                        role: isBackup ? "Backup" : "Primary"
                    });
                }
            }
            return matchedTeams;
        }

        if (typeof rosterData === 'undefined' || typeof numbersList === 'undefined') {
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 50px;'>No roster data found. Please drop your exported <code>roster_data.js</code> file from the Car Number Tracker into the folder!</p>";
        } else {
            const statusMap = {
                'available': 'Available',
                'full-time': 'Full Time',
                'part-time': 'Part Time',
                'reserved': 'Reserved / Practice',
                'past-champion': 'Past Champion Reserved'
            };

            numbersList.forEach(num => {
                const data = rosterData[num] || { driver: '', status: 'available' };
                const hasDriver = data.driver && data.driver.trim() !== '';
                
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-status', data.status);
                
                let teamInfoHtml = '';
                if (hasDriver) {
                    const matches = findTeamsForDriver(data.driver);
                    if (matches.length > 0) {
                        const team = matches[0].team;
                        let name = team.name.toUpperCase();
                        let base = team.homeBase.toUpperCase();
                        
                        const stateMap = {
                            'OH': 'OHIO',
                            'WI': 'WISCONSIN',
                            'NC': 'NORTH CAROLINA',
                            'FL': 'FLORIDA',
                            'GA': 'GEORGIA',
                            'VA': 'VIRGINIA',
                            'IN': 'INDIANA',
                            'TN': 'TENNESSEE',
                            'PA': 'PENNSYLVANIA',
                            'MI': 'MICHIGAN',
                            'IL': 'ILLINOIS',
                            'SC': 'SOUTH CAROLINA',
                            'KS': 'KANSAS',
                            'TX': 'TEXAS',
                            'NV': 'NEVADA',
                            'NY': 'NEW YORK',
                            'AZ': 'ARIZONA',
                            'AL': 'ALABAMA'
                        };
                        
                        base = base.replace(/,/g, '');
                        for (let [abbr, full] of Object.entries(stateMap)) {
                            let regex = new RegExp('\\b' + abbr + '$');
                            if (regex.test(base)) {
                                base = base.replace(regex, full);
                                break;
                            }
                        }
                        
                        teamInfoHtml = `
                            <div class="driver-team" style="font-style: italic; font-weight: bold; font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px;">
                                TEAM: ${name}, ${base}
                            </div>
                        `;
                    }
                }
                
                card.innerHTML = `
                    <div class="card-header">
                        <div style="height: 90px; display:flex; align-items:center;">
                            ${hasDriver ? 
                                `<img src="${getDriverImgPath(data.driver)}" class="custom-number-img" style="max-height: 85px; max-width: 160px; object-fit: contain;" onerror="this.onerror=null; this.outerHTML='<span class=\\'car-number\\'>${num}</span>'">` 
                                : `<span class="car-number">${num}</span>`
                            }
                        </div>
                        <span class="status-badge">${statusMap[data.status] || 'Available'}</span>
                    </div>
                    <div class="input-group">
                        ${hasDriver ? '' : '<label>Driver Name</label>'}
                        <div class="driver-display" style="opacity: ${hasDriver ? '1' : '0.3'}; display: flex; align-items: center;">
                            ${hasDriver ? data.driver.trim() : 'Available'}
                        </div>
                        ${teamInfoHtml}
                        ${hasDriver ? 
                            `<div style="margin-top: 12px;"><a href="https://simracerhub.com/season_standings.php?season_id=28135" target="_blank" style="display:inline-block; color: var(--neon-green); font-size: 0.75rem; text-decoration: none; border: 1px solid var(--neon-green); padding: 4px 10px; border-radius: 4px; text-transform: uppercase; font-family: var(--font-heading); font-weight: bold; transition: all 0.3s ease;">View Stats &rarr;</a></div>` 
                            : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Toggle mobile navigation menu
        document.addEventListener('DOMContentLoaded', function() {
            const toggleBtn = document.querySelector('.nav-toggle');
            const navContainer = document.querySelector('.nav-container');
            
            if (toggleBtn && navContainer) {
                toggleBtn.addEventListener('click', function() {
                    navContainer.classList.toggle('nav-open');
                });
            }
        });
    </script>
    </section>
