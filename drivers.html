    <script>
        const grid = document.getElementById('driver-grid');

        // Compiled resolved SimRacerHub driver IDs (keys are normalized: uppercase, no spaces/punctuation)
        const SRH_IDS = {
            "JACKSONKNAAK": 63408,
            "NOLANGROSS": 41381,
            "BRETGUZIK": 39652,
            "RICKYHART": 20741,
            "RICKYHARTJR": 20741,
            "NICKNICKERSON": 17336,
            "LOGANMURRAY": 118435,
            "LOGANAMURRAY": 118435,
            "SEANBRITT": 63784,
            "NICOLEKRIESEL": 64312,
            "BENJAMINLACY": 50037,
            "BENJAMINILACY": 50037,
            "KEVINFOSTER": 39648,
            "BILLHARKINS": 39625,
            "JONATHONPLATT": 39205,
            "JOHNATHONPLATT": 39205,
            "VICTORWEAVER": 60464,
            "MATTBAILEY": 137917,
            "MATTHEWBAILEY9": 137917,
            "NATHANSANTOS": 121220,
            "NATHANSANTOS2": 121220,
            "JOSHADAMS": 30420,
            "JOSHUALADAMS": 30420,
            "DYLANNICASTRO": 119582,
            "ETHANSIKORSKI": 100493,
            "MICHAELRAMOS": 59641,
            "MICHAELRRAMOS": 59641,
            "CONORGIBSON": 35159,
            "CONNORGIBSON": 35159,
            "CURTISYANCEY": 45358,
            "TYCORINO": 130105,
            "BRANDONGEERS": 67132,
            "BOBBERRY": 1652,
            "MARKALANBIVENS": 56258,
            "MARKALANBIVENS": 56258,
            "JASONGREENWELL": 60453,
            "DAVIDLEAKEY": 60455,
            "DAVELEAKEY": 60455,
            "DAVIDWESTOVERJR": 119581,
            "DAVIDWESTOVER": 119581,
            "BRANDONJACKSON": 21107,
            "EDDIEHAGIGH": 60452,
            "JOSHBILLITER": 45729,
            "JOSHUABILLITER": 45729,
            "DIANTERODER": 136821,
            "DIONTERADER": 136821
        };

        // Custom number image overrides (keys are normalized name strings)
        const NUMBER_IMAGES = {
            "BENJAMINLACY": "Benjamin Lacy.png",
            "BILLHARKINS": "Bill Harkins.png",
            "BRANDONGEERS": "Brandon Geers.png",
            "CURTISYANCEY": "Curtis Yancey.png",
            "DAVIDLEAKEY": "David Leakey.png",
            "DAVIDWESTOVERJR": "David Westover.pmg.png",
            "DAVIDWESTOVER": "David Westover.pmg.png",
            "DIANTERODER": "Dionte_number.png",
            "DIONTERADER": "Dionte_number.png",
            "EDDIEHAGIGH": "Eddie Hagigh.png",
            "ETHANSIKORSKI": "Ethan Sikorski.png",
            "JOSHADAMS": "Josh Adams.png",
            "LOGANMURRAY": "Logan Murray.png",
            "MARKALANBIVENS": "Mark Alan Bivens.png",
            "MATTCROCKETT": "Matt Crockett.png",
            "MICHAELRAKES": "Michael Rakes.png",
            "NATHANSANTOS": "Nathan Santos.png",
            "SEANBRITT": "Sean Britt.png",
            "TYCORINO": "Ty Corino.png",
            "VICTORWEAVER": "Victor Weaver.png",
            "DYLANNICASTRO": "Dillon.png"
        };

        function normalizeName(name) {
            if (!name) return "";
            return name.toUpperCase().trim().replace(/[\s\.\-_]/g, "");
        }

        function getDriverImgPath(name) {
            if (!name) return '';
            const norm = normalizeName(name);
            if (NUMBER_IMAGES[norm]) {
                return `assets/drivers numbers/${NUMBER_IMAGES[norm]}`;
            }
            const formattedName = name.trim().toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            return `assets/drivers numbers/${formattedName}.png`;
        }

        function findTeamsForDriver(driverName) {
            if (typeof teamsData === 'undefined' || !teamsData.teams) return [];
            
            const nameNorm = normalizeName(driverName);
            if (!nameNorm) return [];

            const matchedTeams = [];
            for (let team of teamsData.teams) {
                const primary = (team.drivers.primary || []).map(normalizeName);
                const backup = (team.drivers.backup || []).map(normalizeName);
                if (primary.includes(nameNorm) || backup.includes(nameNorm)) {
                    const isBackup = backup.includes(nameNorm);
                    matchedTeams.push({
                        team: team,
                        role: isBackup ? "Backup" : "Primary"
                    });
                }
            }
            return matchedTeams;
        }

        let lastRosterJson = '';

        function renderDriverGrid() {
            grid.innerHTML = '';
            const statusMap = {
                'available': 'Available',
                'full-time': 'Full Time',
                'part-time': 'Part Time',
                'reserved': 'Reserved / Practice',
                'past-champion': 'Past Champion Reserved'
            };

            numbersList.forEach(num => {
                const data = rosterData[num] || { driver: '', status: 'available' };
                const hasDriver = data.driver && data.driver.trim() !== '' && data.driver.trim().toLowerCase() !== 'available';
                
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-status', data.status);
                
                let teamInfoHtml = '';
                if (hasDriver) {
                    const matches = findTeamsForDriver(data.driver);
                    if (matches.length > 0) {
                        const team = matches[0].team;
                        let name = team.name.toUpperCase();
                        let base = team.homeBase.toUpperCase();
                        
                        const stateMap = {
                            'OH': 'OHIO',
                            'WI': 'WISCONSIN',
                            'NC': 'NORTH CAROLINA',
                            'FL': 'FLORIDA',
                            'GA': 'GEORGIA',
                            'VA': 'VIRGINIA',
                            'IN': 'INDIANA',
                            'TN': 'TENNESSEE',
                            'PA': 'PENNSYLVANIA',
                            'MI': 'MICHIGAN',
                            'IL': 'ILLINOIS',
                            'SC': 'SOUTH CAROLINA',
                            'KS': 'KANSAS',
                            'TX': 'TEXAS',
                            'NV': 'NEVADA',
                            'NY': 'NEW YORK',
                            'AZ': 'ARIZONA',
                            'AL': 'ALABAMA'
                        };
                        
                        base = base.replace(/,/g, '');
                        for (let [abbr, full] of Object.entries(stateMap)) {
                            let regex = new RegExp('\\b' + abbr + '$');
                            if (regex.test(base)) {
                                base = base.replace(regex, full);
                                break;
                            }
                        }
                        
                        teamInfoHtml = `
                            <div class="driver-team" style="font-style: italic; font-weight: bold; font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px;">
                                TEAM: ${name}, ${base}
                            </div>
                        `;
                    }
                }
                
                // Get Stats Link configuration
                let statsButtonHtml = '';
                if (hasDriver) {
                    const norm = normalizeName(data.driver);
                    const srhId = SRH_IDS[norm];
                    if (srhId) {
                        statsButtonHtml = `
                            <div style="margin-top: 12px;">
                                <a href="https://simracerhub.com/driver_stats.php?driver_id=${srhId}&season_id=28135" target="_blank" style="display:inline-block; color: var(--neon-green); font-size: 0.75rem; text-decoration: none; border: 1px solid var(--neon-green); padding: 4px 10px; border-radius: 4px; text-transform: uppercase; font-family: var(--font-heading); font-weight: bold; transition: all 0.3s ease;">
                                    View Stats &rarr;
                                </a>
                            </div>
                        `;
                    } else {
                        statsButtonHtml = `
                            <div style="margin-top: 12px;">
                                <a href="#" onclick="return false;" style="display:inline-block; color: rgba(255,255,255,0.4); font-size: 0.75rem; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 4px; text-transform: uppercase; font-family: var(--font-heading); font-weight: bold; cursor: not-allowed; opacity: 0.65; background: rgba(255,255,255,0.05);">
                                    No Stats Yet
                                </a>
                            </div>
                        `;
                    }
                }
                
                card.innerHTML = `
                    <div class="card-header">
                        <div style="height: 90px; display:flex; align-items:center;">
                            ${hasDriver ? 
                                `<img src="${getDriverImgPath(data.driver)}" class="custom-number-img" onerror="this.onerror=null; this.outerHTML='<span class=\\'car-number\\'>${num}</span>'">` 
                                : `<span class="car-number">${num}</span>`
                            }
                        </div>
                        <span class="status-badge">${statusMap[data.status] || 'Available'}</span>
                    </div>
                    <div class="input-group">
                        ${hasDriver ? '' : '<label>Driver Name</label>'}
                        <div class="driver-display" style="opacity: ${hasDriver ? '1' : '0.3'}; display: flex; align-items: center;">
                            ${hasDriver ? data.driver.trim() : 'Available'}
                        </div>
                        ${teamInfoHtml}
                        ${statsButtonHtml}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function loadRosterDynamically() {
            const oldScript = document.getElementById('dynamic-roster-script');
            if (oldScript) {
                oldScript.remove();
            }

            const script = document.createElement('script');
            script.id = 'dynamic-roster-script';
            script.src = 'roster_data.js?t=' + Date.now();
            
            script.onload = function() {
                if (typeof rosterData !== 'undefined' && typeof numbersList !== 'undefined') {
                    const currentHash = JSON.stringify(rosterData);
                    if (currentHash === lastRosterJson) {
                        return;
                    }
                    lastRosterJson = currentHash;
                    renderDriverGrid();
                }
            };
            document.body.appendChild(script);
        }

        // Run dynamically
        if (typeof rosterData === 'undefined' || typeof numbersList === 'undefined') {
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 50px;'>No roster data found. Please drop your exported <code>roster_data.js</code> file from the Car Number Tracker into the folder!</p>";
            setTimeout(loadRosterDynamically, 3000);
        } else {
            lastRosterJson = JSON.stringify(rosterData);
            renderDriverGrid();
            setInterval(loadRosterDynamically, 3000);
        }

        // Toggle mobile navigation menu
        document.addEventListener('DOMContentLoaded', function() {
            const toggleBtn = document.querySelector('.nav-toggle');
            const navContainer = document.querySelector('.nav-container');
            
            if (toggleBtn && navContainer) {
                toggleBtn.addEventListener('click', function() {
                    navContainer.classList.toggle('nav-open');
                });
            }
        });
    </script>
