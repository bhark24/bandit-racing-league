<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Roster | Bandit Racing League</title>
    <!-- SEO & Page Previews -->
    <meta name="description" content="Meet the drivers of the Bandit Racing League. Browse the official active roster, car numbers, and driver statuses!">
    <meta name="keywords" content="Bandit Racing League, Roster, iRacing Drivers, NASCAR Car Numbers">
    
    <!-- Open Graph / Discord Previews -->
    <meta property="og:title" content="Bandit Racing League - Driver Roster">
    <meta property="og:description" content="Meet the drivers of the Bandit Racing League. Browse the official active roster, car numbers, and driver statuses!">
    <meta property="og:image" content="https://banditracingleague.net/assets/main-logo.png">
    <meta property="og:url" content="https://banditracingleague.net/drivers.html">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#00ff00">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <!-- Mobile Header (Visible only on mobile) -->
            <div class="nav-mobile-header">
                <a href="/index.html" class="nav-brand-mobile">BANDIT RACING LEAGUE</a>
                <button class="nav-toggle" aria-label="Toggle navigation">
                    <span class="hamburger"></span>
                </button>
            </div>
            
            <ul class="nav-links">
                <li><a href="/apply.html" class="btn-secondary">Apply to League</a></li>
                <li><a href="/index.html">Home</a></li>
                <li><a href="/standings.html">Standings</a></li>
                <li><a href="/schedule.html">Schedule</a></li>
                <li><a href="/results.html">Results</a></li>
                <li><a class="active" href="/drivers.html">Drivers</a></li>
                <li><a href="/fantasy.html"><img src="assets/fantasy-icon.png" alt="Fantasy League" style="height: 42px; width: 42px; border-radius: 50%; border: 1.5px solid var(--neon-green); vertical-align: middle; filter: drop-shadow(0 0 5px rgba(0,255,0,0.4)); object-fit: cover;"></a></li>
                <li><a href="/geezer-app.html"><img src="assets/geezer-icon.png" alt="Geezer App" style="height: 42px; vertical-align: middle; filter: drop-shadow(0 0 5px rgba(0,255,0,0.5));"></a></li>
                <li><a href="/simtrax.html"><img src="assets/simtrax-logo.png" alt="SimTrax Broadcasting" style="height: 42px; vertical-align: middle; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));"></a></li>
            </ul>
            <div class="nav-actions" style="display: flex; align-items: center; gap: 15px;">
                <a href="https://discord.gg/zXjvS9en" target="_blank" class="btn-primary">Join Discord</a>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="schedule-header container text-center">
        <div class="header-content">
            <h1 class="italic-heavy accent title-massive">DRIVER ROSTER</h1>
            <h2 class="italic-heavy text-light">SEASON 16</h2>
        </div>
    </header>

    <!-- Grid -->
    <section class="container" style="margin-bottom: 80px;">
        <div class="roster-grid" id="driver-grid">
            <!-- Drivers are dynamically generated here -->
        </div>
    </section>

    <script src="roster_data.js"></script>
    <script>
        const grid = document.getElementById('driver-grid');

        if (typeof rosterData === 'undefined' || typeof numbersList === 'undefined') {
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 50px;'>No roster data found. Please drop your exported <code>roster_data.js</code> file from the Car Number Tracker into the folder!</p>";
        } else {
            const statusMap = {
                'available': 'Available',
                'full-time': 'Full Time',
                'part-time': 'Part Time',
                'reserved': 'Reserved / Practice',
                'past-champion': 'Past Champion Reserved'
            };

            numbersList.forEach(num => {
                const data = rosterData[num] || { driver: '', status: 'available' };
                const hasDriver = data.driver && data.driver.trim() !== '';
                
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-status', data.status);
                
                card.innerHTML = `
                    <div class="card-header">
                        <div style="height: 90px; display:flex; align-items:center; margin-right: 15px;">
                            ${hasDriver ? 
                                `<img src="assets/drivers numbers/${data.driver.trim()}.png" class="custom-number-img" style="max-height: 85px; max-width: 160px; object-fit: contain;" onerror="this.onerror=null; this.outerHTML='<span class=\\'car-number\\'>#${num}</span>'">` 
                                : `<span class="car-number">#${num}</span>`
                            }
                        </div>
                        <span class="status-badge">${statusMap[data.status] || 'Available'}</span>
                    </div>
                    <div class="input-group">
                        ${hasDriver ? '' : '<label>Driver Name</label>'}
                        <div class="driver-display" style="opacity: ${hasDriver ? '1' : '0.3'}; display: flex; align-items: center;">
                            ${hasDriver ? data.driver.trim() : 'Available'}
                        </div>
                        ${hasDriver ? 
                            `<div style="margin-top: 8px;"><a href="https://simracerhub.com/season_standings.php?season_id=28135" target="_blank" style="display:inline-block; color: var(--neon-green); font-size: 0.75rem; text-decoration: none; border: 1px solid var(--neon-green); padding: 3px 8px; border-radius: 4px; text-transform: uppercase;">View Stats &rarr;</a></div>` 
                            : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Toggle mobile navigation menu
        document.addEventListener('DOMContentLoaded', function() {
            const toggleBtn = document.querySelector('.nav-toggle');
            const navContainer = document.querySelector('.nav-container');
            
            if (toggleBtn && navContainer) {
                toggleBtn.addEventListener('click', function() {
                    navContainer.classList.toggle('nav-open');
                });
            }
        });
    </script>
    </section>

    <footer>
        <div class="container footer-content">
            <p>&copy; 2026 Bandit Racing League. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
